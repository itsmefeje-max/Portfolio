    // Initialize the background with Blue Ether Palette
    document.addEventListener('DOMContentLoaded', () => {
      new LiquidEther(document.getElementById('liquid-ether-bg'), {
        colors: ['#000000', '#0f172a', '#3b82f6', '#1d4ed8'], // Blue Palette

        cursorSize: 80,
        autoDemo: true
